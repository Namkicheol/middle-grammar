<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grammar Master: 심화 50제</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;700;800;900&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
/* 클로드 원본 프리미엄 디자인 100% 복구 */
:root{--sky:#e0f2fe;--blue:#0ea5e9;--dark:#0c4a6e;--green:#22c55e;--red:#ef4444;--purple:#8b5cf6;--bg:#f0f9ff;--white:#fff;--gray:#94a3b8;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Noto Sans KR','Baloo 2',sans-serif;background:var(--bg);padding-bottom:60px;font-size:16px;}

/* ── 심화 헤더 ── */
.header{
  background:linear-gradient(135deg,#0c4a6e 0%,#1e40af 55%,#3b82f6 100%);
  padding:44px 20px 54px;text-align:center;position:relative;overflow:hidden;
}
.header::before{
  content:'';position:absolute;inset:0;
  background-image:radial-gradient(rgba(255,255,255,.09) 1px,transparent 1px);
  background-size:22px 22px;pointer-events:none;
}
.header::after{
  content:'';position:absolute;bottom:-1px;left:50%;
  transform:translateX(-50%);width:140%;height:48px;
  background:var(--bg);border-radius:50% 50% 0 0;
}

/* 떠다니는 알파벳 장식 */
.h-letter{
  position:absolute;font-family:'Baloo 2',sans-serif;font-weight:900;
  color:rgba(255,255,255,.14);pointer-events:none;user-select:none;
  line-height:1;letter-spacing:-2px;
}
.h-letter.l-a{font-size:118px;top:-14px;left:4%;animation:floatL 9s ease-in-out infinite;}
.h-letter.l-b{font-size:76px;top:22px;right:7%;animation:floatL 11s ease-in-out infinite reverse;}
.h-letter.l-c{font-size:94px;bottom:8px;left:12%;animation:floatL 7s ease-in-out infinite;}
.h-letter.l-d{font-size:62px;bottom:32px;right:16%;animation:floatL 13s ease-in-out infinite reverse;}
@keyframes floatL{
  0%,100%{transform:translateY(0) rotate(0deg);}
  40%{transform:translateY(-12px) rotate(5deg);}
  70%{transform:translateY(7px) rotate(-3deg);}
}

/* 빛나는 orb */
.h-orb{position:absolute;border-radius:50%;pointer-events:none;filter:blur(50px);}
.h-orb.o1{width:220px;height:220px;background:radial-gradient(circle,rgba(14,165,233,.45) 0%,transparent 70%);top:-60px;right:-40px;}
.h-orb.o2{width:180px;height:180px;background:radial-gradient(circle,rgba(139,92,246,.4) 0%,transparent 70%);bottom:-40px;left:-30px;}

.header-inner{position:relative;z-index:2;}

.hbadge{display:inline-flex;align-items:center;gap:8px;background:rgba(255,255,255,.22);color:#fff;font-size:12px;font-weight:700;letter-spacing:2.2px;padding:6px 18px;border-radius:20px;margin-bottom:12px;border:1px solid rgba(255,255,255,.3);text-transform:uppercase;}
.hbadge-dot{width:6px;height:6px;background:#fde047;border-radius:50%;box-shadow:0 0 8px #fde047;animation:pulse 2s ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1);}50%{opacity:.6;transform:scale(1.3);}}

.header h1{color:#fff;font-size:2.1rem;font-weight:900;margin-bottom:6px;letter-spacing:-.5px;}
.header h1 em{color:#fde047;font-style:normal;filter:drop-shadow(0 0 12px rgba(253,224,71,.5));}
.header p{color:rgba(255,255,255,.82);font-size:.95rem;line-height:1.6;}

.scoreboard{display:flex;justify-content:center;gap:12px;margin:-18px 20px 24px;position:relative;z-index:10;}
.sc{background:var(--white);border-radius:16px;padding:14px 22px;text-align:center;box-shadow:0 4px 20px rgba(0,0,0,.1);flex:1;max-width:120px;}
.sc .n{font-size:2.2rem;font-weight:800;line-height:1;}
.sc .l{font-size:.78rem;color:var(--gray);font-weight:600;margin-top:4px;}
.sc.t .n{color:var(--blue);} .sc.c .n{color:var(--green);} .sc.w .n{color:var(--red);}

.pw{padding:0 20px;margin-bottom:20px;max-width:800px;margin-left:auto;margin-right:auto;}
.plabel{display:flex;justify-content:space-between;font-size:.88rem;font-weight:700;color:var(--gray);margin-bottom:6px;}
.pbg{background:#e2e8f0;border-radius:99px;height:10px;overflow:hidden;}
.pfill{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--blue),var(--purple));transition:width .4s;}

.tabs{display:flex;gap:8px;padding:0 20px;margin-bottom:20px;overflow-x:auto;scrollbar-width:none;max-width:800px;margin-left:auto;margin-right:auto;}
.tabs::-webkit-scrollbar{display:none;}
.tab{flex-shrink:0;padding:11px 20px;border-radius:20px;border:2px solid #e2e8f0;background:var(--white);color:var(--gray);font-family:inherit;font-weight:700;font-size:1rem;cursor:pointer;transition:all .2s;}
.tab.active{background:var(--blue);border-color:var(--blue);color:#fff;box-shadow:0 4px 12px rgba(14,165,233,.35);}

.sec{display:none;padding:0 20px;max-width:800px;margin:0 auto;}
.sec.show{display:block;animation:fadein 0.4s;}
.sec-hdr{background:var(--white);border-radius:18px;padding:18px 22px;margin-bottom:16px;border-left:5px solid var(--blue);box-shadow:0 2px 12px rgba(0,0,0,.06);}
.sec-hdr .lbl{font-size:.82rem;font-weight:800;color:var(--blue);letter-spacing:1px;text-transform:uppercase;margin-bottom:5px;}
.sec-hdr h2{font-size:1.3rem;font-weight:800;color:var(--dark);margin-bottom:5px;}
.sec-hdr .desc{font-size:.98rem;color:#47587a;font-weight:500;line-height:1.55;}

@keyframes slideUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.question-card{background:var(--white);border-radius:18px;padding:24px;margin-bottom:16px;box-shadow:0 2px 12px rgba(0,0,0,.06);position:relative;overflow:hidden;transition:background 0.3s ease;animation:slideUp .35s ease both;}
.question-card::before{content:'';position:absolute;top:0;left:0;width:5px;height:100%;background:#e2e8f0;transition:background .3s;}
.question-card.ok::before{background:var(--green);}
.question-card.ng::before{background:var(--red);}
.question-card.ng{background:#fff1f2;}
.question-card.ok{background:#f0fdf4;}

.q-num{display:inline-flex;align-items:center;justify-content:center;width:32px;height:32px;background:var(--sky);color:var(--blue);border-radius:8px;font-size:.92rem;font-weight:800;margin-bottom:12px;}
.q-type{display:inline-block;margin-left:6px;font-size:.68rem;font-weight:700;background:#dbeafe;color:#1d4ed8;padding:3px 9px;border-radius:10px;letter-spacing:.5px;vertical-align:middle;}
.q-type.fix{background:#fee2e2;color:#b91c1c;}
.q-kor { font-size:1.05rem; font-weight:700; color:var(--dark); margin-bottom:12px; background:#dbeafe; display:inline-block; padding:5px 12px; border-radius:6px;}
.q-text{font-size:1.3rem;font-weight:600;color:var(--dark);margin-bottom:16px;line-height:1.65;}
.q-text em{font-style:normal;color:var(--blue);font-weight:800;border-bottom:2px dotted var(--blue);}
.q-text u{text-decoration-color:var(--blue); text-decoration-thickness:2px; font-weight:800;}
.q-text .wrong{color:var(--red);text-decoration:underline;text-decoration-style:wavy;font-weight:800;}
.q-text .orig{color:#4a5a7a;font-size:.9em;}

.blank{border:none;border-bottom:2.5px solid var(--blue);background:transparent;font-family:inherit;font-size:1.25rem;font-weight:700;color:var(--dark);padding:2px 8px;min-width:90px;text-align:center;outline:none;transition:.2s;display:inline-block;}
.blank:focus{border-color:var(--purple);}
.blank.ok{border-color:var(--green);color:var(--green);background:#dcfce7;border-radius:6px;}
.blank.ng{border-color:var(--red);color:var(--red);background:#fee2e2;border-radius:6px;}

/* 객관식 버튼 */
.choices{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:4px;}
@media (max-width: 600px) { .choices { grid-template-columns: 1fr; } }
.choice{padding:15px 18px;border-radius:14px;border:2px solid #e2e8f0;background:var(--white);color:var(--dark);font-family:inherit;font-weight:600;font-size:1.1rem;cursor:pointer;transition:all .15s;text-align:left;}
.choice:hover:not(:disabled){border-color:var(--blue);background:var(--sky);transform:translateY(-1px);}
.choice.ok{background:#f0fdf4;border-color:var(--green);color:var(--green);}
.choice.ng{background:#fef2f2;border-color:var(--red);color:var(--red);}
.choice.reveal{background:#f0fdf4;border-color:var(--green);color:var(--green);font-weight:800;}

/* 배열 및 주관식 폼 */
.word-pool{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px;min-height:52px;padding:12px;background:var(--sky);border-radius:14px;}
.answer-area{display:flex;flex-wrap:wrap;gap:8px;min-height:54px;padding:12px;background:var(--white);border-radius:14px;border:2px dashed #cbd5e1;margin-bottom:12px;align-items:center;}
.area-ph{color:var(--gray);font-size:.95rem;font-weight:600;}
.chip{padding:9px 15px;border-radius:20px;font-family:inherit;font-weight:700;font-size:1rem;cursor:pointer;border:1px solid #e2e8f0;transition:all .15s;user-select:none;}
.pool-chip{background:var(--white);color:var(--dark);box-shadow:0 2px 6px rgba(0,0,0,.08);}
.pool-chip:hover{background:var(--blue);color:#fff;transform:scale(1.05);}
.ans-chip{background:var(--purple);color:#fff;border-color:var(--purple);}
.ans-chip:hover{opacity:.8;}
.ok-chip{background:var(--green);color:#fff;border-color:var(--green);cursor:default;}
.ng-chip{background:var(--red);color:#fff;border-color:var(--red);cursor:default;}

.input-area{display:block;width:100%;}
.check-btn{display:block;width:100%;margin-top:14px;padding:15px;border-radius:14px;border:none;background:var(--blue);color:#fff;font-family:inherit;font-weight:800;font-size:1.1rem;cursor:pointer;transition:all .15s;}
.check-btn:hover:not(:disabled){filter:brightness(1.08);transform:translateY(-1px);}
.check-btn:disabled{background:#e2e8f0;color:var(--gray);cursor:default;transform:none;}

/* 틀렸을 때 나타나는 💡 정답 및 해설 박스 */
.answer-hint{display:none;margin-top:12px;padding:16px;background:#fef9c3;border-radius:12px;font-size:1rem;font-weight:500;color:#854d0e;line-height:1.6;border:1px solid #fde047;}
.answer-hint.show{display:block;}
.answer-hint strong { color: #b45309; font-weight:800; }
.hint-btn{background:none;border:none;color:var(--gray);font-family:inherit;font-size:.9rem;font-weight:700;cursor:pointer;padding:8px 0;margin-top:4px;display:block;text-decoration:underline;text-underline-offset:3px;}
.hint-btn:hover{color:var(--purple);}
.vw{font-size:.82rem;background:#fef3c7;color:#92400e;border-radius:6px;padding:3px 10px;font-weight:600;margin:1px 2px;display:inline-block;}

.done-badge{position:absolute;top:16px;right:18px;font-size:1.4rem;animation:pop .3s ease;}

/* 결과창 */
#result{display:none;padding:0 20px;max-width:800px;margin:0 auto;animation:fadein .4s;}
.rc{background:linear-gradient(135deg,#0c4a6e,#3b82f6);border-radius:24px;padding:32px 20px;text-align:center;color:#fff;margin-bottom:20px;}
.rc .emoji{font-size:4.5rem;margin-bottom:10px;}
.rc .title{font-size:1.6rem;font-weight:800;margin-bottom:6px;}
.rc .score{font-size:3.5rem;font-weight:800;margin-bottom:6px;}
.rg{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px;}
.rs{background:rgba(255,255,255,.2);border-radius:16px;padding:16px;}
.rs .n{font-size:2rem;font-weight:800;}.rs .l{font-size:.75rem;opacity:.9;}
.rb{display:block;width:100%;padding:16px;border-radius:16px;border:none;background:var(--blue);color:#fff;font-family:inherit;font-weight:800;font-size:1.1rem;cursor:pointer;box-shadow:0 4px 14px rgba(14,165,233,.4);}

#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--dark);color:#fff;padding:12px 24px;border-radius:24px;font-weight:700;font-size:.95rem;transition:transform .3s;z-index:999;pointer-events:none;white-space:nowrap;}
#toast.show{transform:translateX(-50%) translateY(0);}
#toast.ok{background:var(--green);}#toast.ng{background:var(--red);}

@keyframes fadein{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes pop{0%{transform:scale(.8)}70%{transform:scale(1.1)}100%{transform:scale(1)}}
@media(max-width:480px){
  .header h1{font-size:1.7rem;}
  .h-letter.l-a{font-size:90px;}
  .h-letter.l-b{font-size:60px;}
  .h-letter.l-c{font-size:70px;}
  .h-letter.l-d{font-size:52px;}
}
</style>
</head>
<body>
<div id="toast"></div>
<div class="header">
  <div class="h-orb o1"></div>
  <div class="h-orb o2"></div>
  <div class="h-letter l-a">I</div>
  <div class="h-letter l-b">N</div>
  <div class="h-letter l-c">G</div>
  <div class="h-letter l-d">?</div>

  <div class="header-inner">
    <div class="hbadge"><span class="hbadge-dot"></span>Unit 03 · Advanced · 50문제</div>
    <h1>현재진행형 vs 동명사 <em>심화</em></h1>
    <p>상황별 진행형 · 의미별 동명사 · 구조 분석 · 총 50문제</p>
  </div>
</div>

<div class="scoreboard">
  <div class="sc t"><div class="n" id="sc-t">0</div><div class="l">완료</div></div>
  <div class="sc c"><div class="n" id="sc-c">0</div><div class="l">✅ 정답</div></div>
  <div class="sc w"><div class="n" id="sc-w">0</div><div class="l">❌ 오답</div></div>
</div>

<div class="pw">
  <div class="plabel"><span>학습 진행률</span><span id="pt">0 / 50</span></div>
  <div class="pbg"><div class="pfill" id="pf" style="width:0%"></div></div>
</div>

<div class="tabs">
  <button class="tab active" onclick="sw(0,this)">1. 상황별 진행형</button>
  <button class="tab" onclick="sw(1,this)">2. 의미별 동명사</button>
  <button class="tab" onclick="sw(2,this)">3. 영어로 구분하기</button>
</div>

<div class="sec show" id="s0"></div>
<div class="sec" id="s1"></div>
<div class="sec" id="s2"></div>

<div id="result">
  <div class="rc">
    <div class="emoji" id="re">🎉</div><div class="title" id="rt">심화 마스터 완료!</div>
    <div class="score" id="rs">0점</div>
    <div class="rg">
      <div class="rs"><div class="n" id="rc2">0</div><div class="l">✅ 정답</div></div>
      <div class="rs"><div class="n" id="rw2">0</div><div class="l">❌ 오답</div></div>
    </div>
  </div>
  <button class="rb" onclick="location.reload()">🔄 다시 도전하기</button>
</div>

<script>
// Ne교과서 L2 기반 — 진행형(Point A 드릴) + 동명사(Point B 드릴) 문장을 변형
const qData = {
  sec0: [
    { type:"mcq", kor:"Mia는 지금 식물에 물을 주고 있다.", eng:"Mia ___ the plants now.", ans:"is watering", opts:["waters","is watering","watered","watering"], hint:"Mia(3인칭 단수) + now → is + -ing" },
    { type:"mcq", kor:"그들은 지금 커피를 마시고 있다.", eng:"They ___ coffee right now.", ans:"are drinking", opts:["drink","drinks","are drinking","drinking"], hint:"They(복수) + right now → are + -ing" },
    { type:"mcq", kor:"해바라기가 정말 빠르게 자라고 있다.", eng:"The sunflower ___ so fast.", ans:"is growing", opts:["grows","grew","is growing","growing"], hint:"The sunflower(단수) + so fast(변화) → is + -ing" },
    { type:"mcq", kor:"우리는 지금 수영 강습에 가는 중이다.", eng:"We ___ to our swimming lesson now.", ans:"are going", opts:["go","goes","are going","is going"], hint:"We(복수) + now → are + -ing" },
    { type:"mcq", kor:"Jake는 지금 우체국으로 뛰어가고 있다.", eng:"Jake ___ to the post office now.", ans:"is running", opts:["runs","run","is running","running"], hint:"run은 n을 하나 더 붙여 running" },
    { type:"mcq", kor:"333번 버스가 지금 오고 있다.", eng:"The 333 bus ___ now.", ans:"is coming", opts:["comes","come","is coming","coming"], hint:"come은 e를 빼고 +ing → coming" },
    { type:"mcq", kor:"학생들은 지금 프랑스어를 배우고 있다.", eng:"The students ___ French now.", ans:"are learning", opts:["learn","learns","are learning","learning"], hint:"The students(복수) + now → are + -ing" },
    { type:"mcq", kor:"그 남자는 지금 컴퓨터를 고치고 있다.", eng:"The man ___ the computer now.", ans:"is fixing", opts:["fixes","fix","is fixing","fixing"], hint:"The man(3인칭 단수) + now → is + -ing" },
    { type:"mcq", kor:"Sophie는 지금 거울을 보고 있다.", eng:"Sophie ___ in the mirror now.", ans:"is looking", opts:["looks","look","is looking","looking"], hint:"Sophie(단수) + now → is + -ing" },
    { type:"mcq", kor:"우리 가족은 지금 새 식당에서 저녁을 먹고 있다.", eng:"My family ___ dinner at a new restaurant now.", ans:"is having", opts:["has","have","is having","having"], hint:"My family(집합명사, 단수) + now → is + -ing. 이때 have는 '먹다'의 뜻이라 진행형 가능!" },
    { type:"fix", kor:"그녀는 지금 거울을 보고 있다.", eng:"❌ She <span class='wrong'>are</span> looking in the mirror now.", ans:"is", hint:"She(3인칭 단수) → are → is" },
    { type:"input", kor:"나는 지금 점심을 먹고 있다. (have)", eng:"I (am having) lunch now.", ans:"am having", hint:"have가 '먹다' 뜻일 때는 진행형 가능" },
    { type:"fix", kor:"학생들은 지금 프랑스어를 배우고 있다.", eng:"❌ The students <span class='wrong'>is learning</span> French now.", ans:"are learning", hint:"The students(복수) → is → are. 복수 주어는 are + -ing!" },
    { type:"input", kor:"그 소년들은 강에서 수영하고 있다. (swim)", eng:"The boys (are swimming) in the river.", ans:"are swimming", hint:"swim은 m을 하나 더 → swimming" },
    { type:"input", kor:"그는 지금 나에게 거짓말하고 있다. (lie)", eng:"He (is lying) to me.", ans:"is lying", hint:"lie는 ie를 y로 바꾸고 +ing → lying" },
    { type:"scramble", kor:"우리는 버스정류장에서 버스를 기다리고 있다.", eng:"", ans:"We are waiting for the bus", words:["for","are","bus","waiting","We","the"], hint:"wait for ~ (~를 기다리다)" },
    { type:"scramble", kor:"나는 지금 저녁을 요리하고 있지 않다.", eng:"", ans:"I am not cooking dinner now", words:["cooking","not","am","now","I","dinner"], hint:"부정문은 be동사 뒤에 not!" },
    { type:"scramble", kor:"그들은 공원에서 뛰고 있다.", eng:"", ans:"They are running in the park", words:["park","running","in","are","They","the"], hint:"run → running(n 하나 더)" },
    { type:"scramble", kor:"Jaeho는 피아노를 치고 있다.", eng:"", ans:"Jaeho is playing the piano", words:["playing","the","Jaeho","piano","is"], hint:"악기 앞에는 the!" },
    { type:"scramble", kor:"태양이 밝게 빛나고 있다.", eng:"", ans:"The sun is shining brightly", words:["shining","brightly","is","sun","The"], hint:"shine → e 빼고 +ing → shining" }
  ],
  sec1: [
    { type:"mcq", kor:"나는 친구를 한 시간 동안 계속 기다렸다.", eng:"I kept ___ for one hour for my friend.", ans:"waiting", opts:["wait","to wait","waiting","waited"], hint:"keep + -ing (계속 ~하다)" },
    { type:"mcq", kor:"Jake는 스키 타기를 즐겨서 매년 겨울에 스키장에 간다.", eng:"Jake enjoys ___, so he goes to a ski resort every winter.", ans:"skiing", opts:["ski","to ski","skiing","skied"], hint:"enjoy 뒤에는 -ing! ski는 그대로 -ing 추가 → skiing" },
    { type:"mcq", kor:"Sophie는 일찍 일어나는 것을 포기했다.", eng:"Sophie gave up ___ up early.", ans:"waking", opts:["wake","woke","to wake","waking"], hint:"give up 뒤에는 -ing! wake → e 빼고 +ing → waking" },
    { type:"mcq", kor:"나는 보고서를 다 쓰고 잠자리에 들었다.", eng:"I finished ___ a paper and went to sleep.", ans:"writing", opts:["write","wrote","writing","to write"], hint:"finish 뒤에는 -ing!" },

function render() {
    let globalNum = 1;
    [0, 1, 2].forEach(secIdx => {
        let secDiv = document.getElementById('s'+secIdx);
        let html = '';
        let secTitle = ['1. 상황별 진행형', '2. 의미별 동명사', '3. 구조 분석 (영어로)'][secIdx];
        let secDesc = [
            '지금 눈앞에 벌어지는 동작·일시적 상황·변화 과정을 진행형(be + -ing)으로 표현해 보세요.',
            '주어·보어·전치사 뒤 등 명사 자리에 쓰이는 동명사(-ing)를 의미에 맞게 골라 보세요.',
            '같은 -ing 형태가 진행형인지 동명사인지 문장 구조로 구분해 보세요.'
        ][secIdx];
        html += `<div class="sec-hdr"><div class="lbl">STEP ${secIdx+1}</div><h2>${secTitle}</h2><div class="desc">${secDesc}</div></div>`;

        qData['sec'+secIdx].forEach(q => {
            let id = 'q' + globalNum;
            const typeLabel = {mcq:'선택',input:'빈칸',scramble:'배열',dist:'구분',fix:'오류 수정'};
            const typeClass = {mcq:'ctx',input:'ctx',scramble:'ctx',dist:'ctx',fix:'fix'};
            html += `<div class='question-card' id='qc-${id}'>`;
            html += `<div class='q-header'><span class='q-num'>${globalNum}</span><span class='q-type ${typeClass[q.type]||"ctx"}'>${typeLabel[q.type]||q.type}</span>`;
            if(q.kor) html += `<div><span class='q-kor'>${q.kor}</span></div>`;
            html += `</div>`;

            if(q.type === 'mcq' || q.type === 'dist') {
                html += `<div class='q-text'>${q.eng.replace(/___/g, "<em>___</em>")}</div>`;
                html += `<div class='choices' ${q.type==='dist'?'style="grid-template-columns:1fr 1fr;"':''}>`;
                let opts = q.type==='dist' ? q.opts : [...q.opts].sort(()=>Math.random()-0.5);
                opts.forEach(o => {
                    html += `<button class='choice' onclick="checkChoice(this, '${q.ans.replace(/'/g,"\\'").replace(/"/g,"&quot;")}', '${id}')">${o}</button>`;
                });
                html += `</div>`;
            } else if (q.type === 'fix') {
                html += `<div class='q-text'><span class='orig'>${q.eng}</span><br>→ 밑줄 친 부분을 바르게 고치세요: <input class='blank' id='bi-${id}' placeholder='___' data-ans="${q.ans.replace(/"/g,"&quot;")}" autocomplete='off' style='min-width:140px'></div>`;
                html += `<button class='check-btn' onclick="checkBlank('${id}')">✔ 정답 확인</button>`;
            } else if (q.type === 'input') {
                let parts = q.eng.split(/\((.*?)\)/g);
                let engHTML = "";
                if(parts.length > 1) {
                    for(let i=0; i<parts.length; i++) {
                        if(i%2 === 1) engHTML += `<input class='blank' id='bi-${id}' placeholder='___' data-ans="${parts[i].replace(/"/g,"&quot;")}" autocomplete='off'>`;
                        else engHTML += parts[i];
                    }
                }
                html += `<div class='q-text'>${engHTML}</div>`;
                html += `<button class='check-btn' onclick="checkBlank('${id}')">✔ 정답 확인</button>`;
            } else if (q.type === 'scramble') {
                placed[id] = [];
                html += `<div class='word-pool' id='pool-${id}'>`;
                q.words.sort(()=>Math.random()-0.5).forEach((w, wi) => {
                    html += `<button class='chip pool-chip' id='wc-${id}-${wi}' onclick="moveWord('${id}',${wi},this)">${w}</button>`;
                });
                html += `</div>`;
                html += `<div class='answer-area' id='area-${id}'><span class='area-ph'>단어 칩을 눌러 문장을 완성하세요 →</span></div>`;

            }
            
            let vHtml='';

            html += `<button class='hint-btn' onclick="showHint('${id}')">💡 정답/해설 보기</button>`;
            html += `</div>`;
            globalNum++;
        });
        secDiv.innerHTML = html;
    });
}
window.onload = render;

function sw(i, btn) {
    document.querySelectorAll('.sec').forEach(s => s.classList.remove('show'));
    document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
    document.getElementById('s'+i).classList.add('show');
    btn.classList.add('active');
    window.scrollTo({top: 0, behavior: 'smooth'});
}
function showHint(k) { document.getElementById('ah-'+k).classList.add('show'); }

function checkChoice(btn, ans, k) {
    var card = document.getElementById('qc-'+k);
    if (card.classList.contains('ok') || card.classList.contains('ng')) return;
    var btns = btn.parentElement.querySelectorAll('.choice');
    btns.forEach(b => b.disabled = true);
    var got = btn.textContent.trim() === ans;
    btn.classList.add(got ? 'ok' : 'ng');
    if (!got) btns.forEach(b => { if (b.textContent.trim()===ans) b.classList.add('reveal'); });
    mark(k, got);
}

function checkBlank(k) {
    var inps = document.querySelectorAll(`#qc-${k} .blank`);
    var card = document.getElementById('qc-'+k);
    if (card.classList.contains('ok') || card.classList.contains('ng')) return;
    if ([...inps].some(inp => !inp.value.trim())) { toast('답을 입력하세요!', 'ng'); return; }
    let allGot = true;
    inps.forEach(inp => {
        inp.disabled = true;
        if(!window._norm){window._norm=function(s){s=s.trim().toLowerCase().replace(/\s+/g,' ');s=s.replace(/isn't/g,'is not').replace(/aren't/g,'are not').replace(/wasn't/g,'was not').replace(/weren't/g,'were not').replace(/don't/g,'do not').replace(/doesn't/g,'does not').replace(/didn't/g,'did not').replace(/won't/g,'will not').replace(/shouldn't/g,'should not').replace(/can't/g,'cannot');return s;};}
        var typed = window._norm(inp.value);
        var ans = window._norm(inp.dataset.ans);
        var got = (typed === ans || (inp.dataset.ans2 && typed === window._norm(inp.dataset.ans2)));
        inp.classList.add(got ? 'ok' : 'ng');
        if(!got) allGot = false;
    });
    card.querySelector('.check-btn').disabled = true;
    mark(k, allGot);
}

document.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && e.target.classList.contains('blank')) {
        let k = e.target.id.split('-')[1];
        checkBlank(k);
    }
});

function moveWord(k, i, btn) {
    if (btn.style.visibility === 'hidden' || btn.disabled) return;
    btn.style.visibility = 'hidden';
    placed[k].push({i: i, w: btn.textContent});
    refreshArea(k);
}
function removeWord(k, pos) {
    var it = placed[k].splice(pos, 1)[0];
    var btn = document.getElementById('wc-'+k+'-'+it.i);
    if (btn) btn.style.visibility = 'visible';
    refreshArea(k);
}
function refreshArea(k) {
    var area = document.getElementById('area-'+k);
    if (!placed[k].length) {
        area.innerHTML = '<span class="area-ph">단어 칩을 눌러 문장을 완성하세요 →</span>';
        return;
    }
    area.innerHTML = '';
    placed[k].forEach((it, pos) => {
        var c = document.createElement('button');
        c.className = 'chip ans-chip';
        c.textContent = it.w;
        c.onclick = () => removeWord(k, pos);
        area.appendChild(c);
    });
}
function checkArrange(k, ans) {
    var card = document.getElementById('qc-'+k);
    if (card.classList.contains('ok') || card.classList.contains('ng')) return;
    if (!placed[k].length) { toast('단어를 배열하세요!', 'ng'); return; }
    var typed = placed[k].map(i => i.w).join(' ').trim().toLowerCase().replace(/\s+/g, ' ');
    var cleanAns = ans.trim().toLowerCase().replace(/\s+/g, ' ');
    card.querySelector('.check-btn').disabled = true;
    document.querySelectorAll('#pool-'+k+' .pool-chip').forEach(c => { c.style.visibility = 'hidden'; c.disabled = true; });
    var chips = document.querySelectorAll('#area-'+k+' .ans-chip');
    var got = (typed === cleanAns);
    chips.forEach(c => {
        c.classList.remove('ans-chip'); c.classList.add(got ? 'ok-chip' : 'ng-chip'); c.onclick = null;
    });
    mark(k, got);
}

function mark(k, got) {
    if (answered[k]) return;
    answered[k] = true;
    var card = document.getElementById('qc-'+k);
    card.classList.add(got ? 'ok' : 'ng');
    var b = document.createElement('div');
    b.className = 'done-badge'; b.textContent = got ? '✅' : '❌';
    card.appendChild(b);
    var n = parseInt(k.slice(1)), si = n <= 20 ? 0 : n <= 40 ? 1 : 2;
    if (got) { correct++; secC[si]++; toast('🎉 정답!','ok'); }
    else { wrong++; secW[si]++; document.getElementById('ah-'+k).classList.add('show'); toast('틀렸어요! 정답/해설 확인 👆','ng'); }
    var done = correct+wrong;
    document.getElementById('sc-t').textContent = done;
    document.getElementById('sc-c').textContent = correct;
    document.getElementById('sc-w').textContent = wrong;
    document.getElementById('pt').textContent = done+' / '+TOTAL;
    document.getElementById('pf').style.width = (done/TOTAL*100)+'%';
    var secDone = secC[si]+secW[si];
    if (secDone === SECTOTALS[si]) {
        (function(i, sc) {
            setTimeout(function() {
                var opts = {};
                if (i===0) opts={nextText:'의미별 동명사 탭으로 →',onNextClick:function(){var ol=document.getElementById('sp-overlay');if(ol)ol.remove();sw(1,document.querySelectorAll('.tab')[1]);}};
                else if (i===1) opts={nextText:'영어로 구분하기 탭으로 →',onNextClick:function(){var ol=document.getElementById('sp-overlay');if(ol)ol.remove();sw(2,document.querySelectorAll('.tab')[2]);}};
                showScorePopup(sc, SECTOTALS[i], opts);
            }, 800);
        })(si, secC[si]);
    }
    if (done===TOTAL) setTimeout(showResult, 800);
}

function showResult() {
    document.querySelectorAll('.sec').forEach(s => s.style.display='none');
    document.querySelector('.tabs').style.display = 'none';
    document.getElementById('result').style.display = 'block';
    var sc = Math.round(correct/TOTAL*100);
    var e='😊', t='수고했어요!';
    if(sc>=90){e='🏆';t='완벽해요!';} else if(sc>=70){e='🎉';t='잘 했어요!';} else if(sc>=50){e='💪';t='절반 이상 맞았어요!';}
    document.getElementById('re').textContent=e; document.getElementById('rt').textContent=t;
    document.getElementById('rs').textContent=sc+'점';
    document.getElementById('rc2').textContent=correct; document.getElementById('rw2').textContent=wrong;
    // 섹션별 팝업으로 대체됨
}

function toast(msg, type) {
    var t = document.getElementById('toast');
    t.textContent = msg; t.className = 'show '+(type||'');
    clearTimeout(t._t); t._t = setTimeout(() => t.classList.remove('show'), 1800);
}
</script>
